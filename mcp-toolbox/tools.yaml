kind: source
name: crisalid-neo4j
type: neo4j
uri: ${NEO4J_URI}
user: ${NEO4J_USER}
password: ${NEO4J_PASSWORD}
database: neo4j

---

kind: tool
name: get-crisalid-schema
type: neo4j-schema
source: crisalid-neo4j
description: |
  Return the full schema of the CRISalid knowledge graph: node labels,
  relationship types, and property keys. Use this to understand what
  queries are possible before calling other tools.
cacheExpireMinutes: 120

---

kind: tool
name: execute-cypher-readonly
type: neo4j-execute-cypher
source: crisalid-neo4j
description: |
  Execute an arbitrary read-only Cypher query against the CRISalid knowledge graph.
  Only read queries are allowed (no CREATE, MERGE, DELETE, SET).
  Intended for advanced clients with direct graph access needs.
readOnly: true

---

kind: tool
name: list-person-publications
type: neo4j-cypher
source: crisalid-neo4j
description: |
  List all publications for a person identified by their uid.
  Returns for each document: uid, one title, and publication date.
  Use get-publication with a document uid to retrieve full details.
parameters:
  - name: person_uid
    type: string
    description: Unique identifier of the person (Person.uid)
statement: |
  MATCH (person:Person {uid: $person_uid})-[:HAS_CONTRIBUTION]->(:Contribution)<-[:HAS_CONTRIBUTION]-(doc:Document)
  OPTIONAL MATCH (doc)-[:HAS_TITLE]->(t:Literal)
  WITH doc, collect(t.value)[0] AS title
  RETURN doc.uid AS uid,
         title,
         doc.publication_date AS publication_date
  ORDER BY doc.publication_date DESC

---

kind: tool
name: get-publication
type: neo4j-cypher
source: crisalid-neo4j
description: |
  Return full details for a document identified by its uid.
  Returns titles, journal channel (volume/issue/pages + identifiers),
  source records (harvester metadata only — no SourceJournal or SourceContribution),
  and co-authors with their institutional affiliation statements.
parameters:
  - name: uid
    type: string
    description: Unique identifier of the document (Document.uid)
statement: |
  MATCH (doc:Document {uid: $uid})
  CALL {
    WITH doc
    OPTIONAL MATCH (doc)-[:HAS_TITLE]->(t:Literal)
    RETURN collect(DISTINCT t.value) AS titles
  }
  CALL {
    WITH doc
    OPTIONAL MATCH (doc)-[pub:PUBLISHED_IN]->(journal:Journal)
    OPTIONAL MATCH (journal)-[:HAS_IDENTIFIER]->(jid:JournalIdentifier)
    WITH pub, journal, collect(DISTINCT jid) AS journal_identifiers
    RETURN collect(DISTINCT CASE WHEN journal IS NOT NULL THEN {
      volume: pub.volume, issue: pub.issue, pages: pub.pages,
      uid: journal.uid, issn_l: journal.issn_l,
      publisher: journal.publisher, titles: journal.titles,
      labels: labels(journal),
      identifiers: journal_identifiers
    } END) AS publication_channels
  }
  CALL {
    WITH doc
    OPTIONAL MATCH (doc)-[:HAS_ABSTRACT]->(a:TextLiteral)
    RETURN collect(DISTINCT CASE WHEN a IS NOT NULL
      THEN {value: a.value, language: a.language} END) AS abstracts
  }
  CALL {
    WITH doc
    OPTIONAL MATCH (doc)-[:RECORDED_BY]->(sr:SourceRecord)
    RETURN collect(DISTINCT CASE WHEN sr IS NOT NULL THEN {
      uid: sr.uid, harvester: sr.harvester, url: sr.url,
      issued: sr.issued, document_types: sr.document_types,
      source_identifier: sr.source_identifier
    } END) AS source_records
  }
  CALL {
    WITH doc
    OPTIONAL MATCH (doc)-[:HAS_CONTRIBUTION]->(contrib:Contribution)<-[:HAS_CONTRIBUTION]-(contributor:Person)
    OPTIONAL MATCH (contributor)-[:HAS_NAME]->(pn:PersonName)
    OPTIONAL MATCH (pn)-[:HAS_FIRST_NAME]->(fn:Literal)
    OPTIONAL MATCH (pn)-[:HAS_LAST_NAME]->(ln:Literal)
    OPTIONAL MATCH (contrib)-[:HAS_AFFILIATION_STATEMENT]->(affil:AuthorityOrganization)
    WITH contrib, contributor,
         collect(DISTINCT {first_name: fn.value, last_name: ln.value}) AS names,
         collect(DISTINCT CASE WHEN affil IS NOT NULL
           THEN {uid: affil.uid, display_names: affil.display_names} END) AS affiliations
    RETURN collect(DISTINCT CASE WHEN contributor IS NOT NULL THEN {
      roles: contrib.roles,
      affiliations: affiliations,
      person: {uid: contributor.uid, external: contributor.external, names: names}
    } END) AS contributions
  }
  RETURN doc.uid AS uid,
         doc.document_type AS document_type,
         doc.publication_date AS publication_date,
         doc.publication_date_start AS publication_date_start,
         doc.publication_date_end AS publication_date_end,
         doc.oa_status AS oa_status,
         doc.upw_oa_status AS upw_oa_status,
         titles, abstracts, publication_channels, source_records, contributions

---

kind: tool
name: list-person-concepts
type: neo4j-cypher
source: crisalid-neo4j
description: |
  List the research concepts (SKOS subjects) associated with a person's publications,
  ranked by prominence (most frequently tagged first).
  Each concept includes its uid, URI (if a controlled-vocabulary concept), preferred
  labels, and the uids of the tagged documents.
  Preferred labels are returned in the requested languages; if none match, English is
  used as a fallback, and if English is also absent all available labels are returned
  (up to 3). Alternative labels are returned only when explicitly requested.

  IMPORTANT — noise in results: the underlying bibliographic data is harvested from
  multiple sources and is not curated. As a result, some returned concepts may be
  generic document-type labels (e.g. "Thèses et écrits académiques", "Actes de
  congrès") or overly broad domain labels (e.g. "Sociologie", "Sciences humaines")
  rather than genuine research topics. Clients should treat these with low confidence
  and may choose to ignore them or deprioritise them when presenting results to users.
parameters:
  - name: person_uid
    type: string
    description: Unique identifier of the person (Person.uid)
  - name: languages
    type: string
    description: Comma-separated preferred language codes, ISO 639-1 (e.g. "en" or "en,fr")
    default: "en"
  - name: include_alt_labels
    type: integer
    description: Set to 1 to include alternative labels (skos:altLabel) for each concept, 0 to omit
    default: 0
  - name: limit
    type: integer
    description: Maximum number of concepts to return, ranked by prominence
    default: 15
statement: |
  MATCH (person:Person {uid: $person_uid})-[:HAS_CONTRIBUTION]->(:Contribution)<-[:HAS_CONTRIBUTION]-(doc:Document)
  MATCH (doc)-[:HAS_SUBJECT]->(concept:Concept)
  WITH concept, collect(DISTINCT doc.uid) AS document_uids, count(DISTINCT doc) AS doc_count
  ORDER BY doc_count DESC
  LIMIT $limit
  OPTIONAL MATCH (concept)-[:HAS_PREF_LABEL]->(pl:Literal {type: 'concept_pref_label'})
  WITH concept, document_uids,
       collect(DISTINCT {value: pl.value, language: CASE WHEN pl.language = 'ul' THEN null ELSE pl.language END}) AS all_pref_labels
  WITH concept, document_uids, all_pref_labels,
       [l IN all_pref_labels WHERE l.language IN split($languages, ',')] AS requested_pref_labels,
       [l IN all_pref_labels WHERE l.language = 'en'] AS en_pref_labels,
       [l IN all_pref_labels WHERE l.language IS NULL] AS undetermined_pref_labels
  WITH concept, document_uids, undetermined_pref_labels,
       CASE
         WHEN size(requested_pref_labels) > 0 THEN requested_pref_labels
         WHEN size(en_pref_labels) > 0 THEN en_pref_labels
         ELSE [l IN all_pref_labels WHERE l.language IS NOT NULL][..3]
       END AS lang_pref_labels
  WITH concept, document_uids,
       lang_pref_labels + [l IN undetermined_pref_labels WHERE NOT l IN lang_pref_labels] AS pref_labels
  OPTIONAL MATCH (concept)-[:HAS_ALT_LABEL]->(al:Literal {type: 'concept_alt_label'})
  WITH concept, document_uids, pref_labels,
       collect(DISTINCT CASE
         WHEN al IS NOT NULL AND $include_alt_labels = 1
         THEN {value: al.value, language: CASE WHEN al.language = 'ul' THEN null ELSE al.language END}
       END) AS alt_labels
  RETURN
    concept.uid AS uid,
    concept.uri AS uri,
    pref_labels,
    alt_labels,
    document_uids

---

kind: tool
name: search-person-by-name
type: neo4j-cypher
source: crisalid-neo4j
description: |
  Search for a person in the CRISalid knowledge graph by display name.
  Handles any word order, single last name, accent variants, misspellings,
  and hyphenated compound names (e.g. "Martinet-Dupré" still matches "Martinet").
  Returns candidates ranked by relevance score, each with uid, identifiers, and
  laboratory membership.
parameters:
  - name: name
    type: string
    description: Name to search for — first name, last name, or both in any order; misspellings and accent variants are tolerated
  - name: max_results
    type: integer
    description: Maximum number of candidates to return
statement: |
  WITH $name AS raw_input
  WITH replace(raw_input, '-', ' ') AS input
  WITH input, split(trim(input), ' ') AS tokens
  WITH input, tokens,
       tokens[0] AS t0,
       CASE WHEN size(tokens) > 1 THEN tokens[1] ELSE tokens[0] END AS t1
  // Build a 4-tier Lucene query (example input: "Alice Martinet-Dupré"):
  //   tier 1 — exact phrase, any order:        display_name:"Alice Martinet Dupré"^10
  //   tier 2 — fuzzy AND of ALL tokens:        display_name:(Alice~2 AND Martinet~2 AND Dupré~2)^5
  //   tier 3 — fuzzy AND of first two tokens:  display_name:(Alice~2 AND Martinet~2)^3
  //   tier 4 — second token fuzzy alone:       display_name:Martinet~2
  WITH
    'display_name:"' + input + '"^10 OR display_name:(' +
    reduce(acc = '', t IN tokens | CASE WHEN acc = '' THEN t + '~2' ELSE acc + ' AND ' + t + '~2' END) +
    ')^5 OR display_name:(' + t0 + '~2 AND ' + t1 + '~2)^3 OR display_name:' + t1 + '~2' AS lucene_query
  CALL db.index.fulltext.queryNodes('person_fulltext_name', lucene_query)
  YIELD node AS person, score
  WITH person, score ORDER BY score DESC LIMIT $max_results
  OPTIONAL MATCH (person)-[:HAS_IDENTIFIER]->(id:AgentIdentifier)
  WITH person, score,
       collect(DISTINCT CASE WHEN id IS NOT NULL THEN {type: id.type, value: id.value} END) AS identifiers
  OPTIONAL MATCH (person)-[:MEMBER_OF]->(ru:OrganizationUnit)
  OPTIONAL MATCH (ru)-[:HAS_LONG_LABEL]->(ll:Literal {type: 'organization_long_label'})
  OPTIONAL MATCH (ru)-[:HAS_SHORT_LABEL]->(sl:Literal {type: 'organization_short_label'})
  WITH person, score, identifiers, ru,
       collect(DISTINCT CASE WHEN ll IS NOT NULL THEN ll.value END) AS long_labels,
       collect(DISTINCT CASE WHEN sl IS NOT NULL THEN sl.value END) AS short_labels
  RETURN
    person.uid AS uid,
    person.display_name AS display_name,
    person.external AS external,
    score,
    identifiers,
    collect(DISTINCT CASE WHEN ru IS NOT NULL THEN {uid: ru.uid, long_labels: long_labels, short_labels: short_labels} END) AS laboratories
  ORDER BY score DESC

---

kind: tool
name: list-person-collaborators
type: neo4j-cypher
source: crisalid-neo4j
description: |
  List the collaborators of a person — defined as people who co-authored at least
  one Document with them. Results are ordered by number of shared publications
  (descending) and capped at 15.
  Each entry includes the collaborator's uid, display name, names (first/last),
  whether they are internal or external, and the list of shared document titles.
  Affiliations (from co-author contribution statements) are included only when
  explicitly requested.
parameters:
  - name: person_uid
    type: string
    description: Unique identifier of the person (Person.uid)
  - name: start_date
    type: string
    description: "Filter collaborations from this date onward (ISO 8601, e.g. '2020-01-01'). Leave empty for no lower bound."
    default: ""
  - name: end_date
    type: string
    description: "Filter collaborations up to this date (ISO 8601). Defaults to today when start_date is provided but end_date is omitted. Leave empty for no upper bound."
    default: ""
  - name: include_affiliations
    type: integer
    description: Set to 1 to include each collaborator's institutional affiliations, 0 to omit
    default: 0
statement: |
  MATCH (person:Person {uid: $person_uid})-[:HAS_CONTRIBUTION]->(:Contribution)<-[:HAS_CONTRIBUTION]-(doc:Document)
  WHERE ($start_date = '' OR doc.publication_date >= $start_date)
    AND (CASE
      WHEN $end_date = '' AND $start_date <> '' THEN doc.publication_date <= toString(date())
      WHEN $end_date <> '' THEN doc.publication_date <= $end_date
      ELSE true
    END)
  MATCH (doc)-[:HAS_CONTRIBUTION]->(collab_contrib:Contribution)<-[:HAS_CONTRIBUTION]-(collaborator:Person)
  WHERE collaborator <> person
  OPTIONAL MATCH (doc)-[:HAS_TITLE]->(t:Literal)
  WITH collaborator, collab_contrib, doc, collect(t.value)[0] AS doc_title
  OPTIONAL MATCH (collab_contrib)-[:HAS_AFFILIATION_STATEMENT]->(org:AuthorityOrganization)
  WITH collaborator,
       collect(DISTINCT {uid: doc.uid, title: doc_title}) AS shared_docs,
       collect(DISTINCT CASE WHEN org IS NOT NULL
         THEN {uid: org.uid, display_names: org.display_names} END) AS affiliations
  ORDER BY size(shared_docs) DESC
  LIMIT 15
  OPTIONAL MATCH (collaborator)-[:HAS_NAME]->(pn:PersonName)
  OPTIONAL MATCH (pn)-[:HAS_FIRST_NAME]->(fn:Literal)
  OPTIONAL MATCH (pn)-[:HAS_LAST_NAME]->(ln:Literal)
  WITH collaborator, shared_docs, affiliations,
       collect(DISTINCT CASE WHEN fn IS NOT NULL OR ln IS NOT NULL
         THEN {first_name: fn.value, last_name: ln.value} END) AS names
  RETURN
    collaborator.uid AS uid,
    collaborator.display_name AS display_name,
    collaborator.external AS external,
    names,
    shared_docs,
    CASE WHEN $include_affiliations = 1 THEN affiliations ELSE [] END AS affiliations
  ORDER BY size(shared_docs) DESC

---

kind: tool
name: get-institution-locations
type: neo4j-cypher
source: crisalid-neo4j
description: |
  Return location data (coordinates and physical address) for one or more affiliation
  institutions identified by their UIDs. UIDs refer to AuthorityOrganization nodes —
  either Root or State subtypes — as returned by tools such as list-person-collaborators.
  One entry is returned per input UID, including empty location fields when the institution
  is not found or has no location data.
parameters:
  - name: institution_uids
    type: string
    description: UID or comma-separated list of UIDs of the affiliation institutions (AuthorityOrganization.uid)
statement: |
  WITH split($institution_uids, ',') AS uid_list
  UNWIND uid_list AS raw_uid
  WITH trim(raw_uid) AS institution_uid
  OPTIONAL MATCH (org:AuthorityOrganization {uid: institution_uid})
  OPTIONAL MATCH (org)-[:HAS_POS]->(place:Place)
  WITH institution_uid, org,
       collect(DISTINCT CASE WHEN place IS NOT NULL
         THEN {latitude: place.latitude, longitude: place.longitude} END) AS coordinates
  OPTIONAL MATCH (org)-[:HAS_ADDRESS]->(addr:StructuredPhysicalAddress)
  OPTIONAL MATCH (addr)-[:HAS_STREET]->(street:Literal {type: 'institution_street_name'})
  OPTIONAL MATCH (addr)-[:HAS_CITY]->(city:Literal {type: 'institution_city_name'})
  OPTIONAL MATCH (addr)-[:HAS_ZIP_CODE]->(zip:Literal {type: 'institution_zip_code'})
  OPTIONAL MATCH (addr)-[:HAS_STATE]->(state_lit:Literal {type: 'institution_state_name'})
  OPTIONAL MATCH (addr)-[:HAS_COUNTRY]->(country:Literal {type: 'institution_country_name'})
  OPTIONAL MATCH (addr)-[:HAS_CONTINENT]->(continent:Literal {type: 'institution_continent_name'})
  WITH institution_uid, org, coordinates, addr,
       collect(DISTINCT CASE WHEN street IS NOT NULL
         THEN {value: street.value, language: coalesce(street.language, 'und')} END) AS streets,
       collect(DISTINCT CASE WHEN city IS NOT NULL
         THEN {value: city.value, language: coalesce(city.language, 'und')} END) AS cities,
       collect(DISTINCT CASE WHEN zip IS NOT NULL
         THEN {value: zip.value, language: coalesce(zip.language, 'und')} END) AS zip_codes,
       collect(DISTINCT CASE WHEN state_lit IS NOT NULL
         THEN {value: state_lit.value, language: coalesce(state_lit.language, 'und')} END) AS states,
       collect(DISTINCT CASE WHEN country IS NOT NULL
         THEN {value: country.value, language: coalesce(country.language, 'und')} END) AS countries,
       collect(DISTINCT CASE WHEN continent IS NOT NULL
         THEN {value: continent.value, language: coalesce(continent.language, 'und')} END) AS continents
  RETURN
      institution_uid AS uid,
      org.display_names AS display_names,
      coordinates,
      collect(DISTINCT CASE WHEN addr IS NOT NULL THEN {
          uid: addr.uid,
          street: streets,
          city: cities,
          zip_code: zip_codes,
          state_or_province: states,
          country: countries,
          continent: continents
      } END) AS addresses

---

kind: tool
name: get-person-memberships
type: neo4j-cypher
source: crisalid-neo4j
description: |
  Return the OrganizationUnit(s) that a person is directly a member of,
  as recorded in the institution's directory (MEMBER_OF relationships).
  Each entry includes the unit UID and its human-readable labels (long name
  and short name/acronym), which may be available in multiple languages.
  Returns an empty list if the person has no direct memberships.
parameters:
  - name: person_uid
    type: string
    description: Unique identifier of the person (Person.uid)
statement: |
  MATCH (person:Person {uid: $person_uid})-[:MEMBER_OF]->(org:OrganizationUnit)
  OPTIONAL MATCH (org)-[:HAS_LONG_LABEL]->(ll:Literal {type: 'organization_long_label'})
  OPTIONAL MATCH (org)-[:HAS_SHORT_LABEL]->(sl:Literal {type: 'organization_short_label'})
  WITH org,
       collect(DISTINCT CASE WHEN ll IS NOT NULL THEN {value: ll.value, language: ll.language} END) AS long_labels,
       collect(DISTINCT CASE WHEN sl IS NOT NULL THEN {value: sl.value, language: sl.language} END) AS short_labels
  RETURN
    org.uid AS institution_uid,
    long_labels,
    short_labels

---

kind: tool
name: search-researchers-by-concept
type: neo4j-cypher
source: crisalid-neo4j
description: |
  Search for internal researchers who have authored publications related to a
  given concept or keyword. The concept string is matched as a case-insensitive
  substring against all concept labels (preferred and alternative, any language)
  and against free-text keyword labels.
  Returns one entry per researcher, sorted by number of matching publications
  (highest first). Only researchers with external: false are included.
parameters:
  - name: concept
    type: string
    description: Free-text concept to search for — matched as a case-insensitive substring against concept/keyword labels
  - name: limit
    type: integer
    description: Maximum number of researchers to return
    default: 15
statement: |
  MATCH (person:Person {external: false})-[:HAS_CONTRIBUTION]->(:Contribution)<-[:HAS_CONTRIBUTION]-(doc:Document)
  MATCH (doc)-[:HAS_SUBJECT]->(concept:Concept)
  WHERE (
    any(v IN [(concept)-[:HAS_PREF_LABEL]->(l) | l.value] WHERE toLower(v) CONTAINS toLower($concept))
    OR any(v IN [(concept)-[:HAS_ALT_LABEL]->(l) | l.value] WHERE toLower(v) CONTAINS toLower($concept))
    OR (concept.prefLabel IS NOT NULL AND toLower(concept.prefLabel) CONTAINS toLower($concept))
  )
  WITH DISTINCT person, doc
  OPTIONAL MATCH (doc)-[:HAS_TITLE]->(t:Literal)
  WITH person, doc, collect(t.value)[0] AS title
  WITH person,
       collect(DISTINCT title) AS publication_titles,
       count(DISTINCT doc) AS publication_count
  RETURN
    person.uid AS researcher_uid,
    person.display_name AS researcher_name,
    publication_titles,
    publication_count
  ORDER BY publication_count DESC
  LIMIT $limit

---

kind: tool
name: search-organization-unit-by-name
type: neo4j-cypher
source: crisalid-neo4j
description: |
  Search for OrganizationUnit nodes by a partial name string, matched
  case-insensitively against both long labels and short labels.
  Returns uid, long label, and generic type for each match.
  Optionally includes the direct parent unit and/or direct child units.
parameters:
  - name: name
    type: string
    description: Partial name to search for — case-insensitive substring match against long and short labels
  - name: include_parent
    type: integer
    description: Set to 1 to include the direct parent OrganizationUnit for each match
    default: 0
  - name: include_children
    type: integer
    description: Set to 1 to include direct child OrganizationUnits for each match
    default: 0
  - name: limit
    type: integer
    description: Maximum number of results to return — short label matches and research units rank first
    default: 1
statement: |
  MATCH (org:OrganizationUnit)
  WHERE (
    any(v IN [(org)-[:HAS_LONG_LABEL]->(l) | l.value] WHERE toLower(v) CONTAINS toLower($name))
    OR any(v IN [(org)-[:HAS_SHORT_LABEL]->(s) | s.value] WHERE toLower(v) CONTAINS toLower($name))
  )
  CALL {
    WITH org
    OPTIONAL MATCH (org)-[:HAS_LONG_LABEL]->(ll:Literal {type: 'organization_long_label'})
    RETURN collect(ll.value)[0] AS long_label
  }
  CALL {
    WITH org
    OPTIONAL MATCH (org)-[:PART_OF|MEMBER_OF]->(parent:OrganizationUnit)
    OPTIONAL MATCH (parent)-[:HAS_LONG_LABEL]->(pll:Literal {type: 'organization_long_label'})
    WITH parent, collect(pll.value)[0] AS parent_label
    RETURN collect(DISTINCT CASE WHEN parent IS NOT NULL
      THEN {uid: parent.uid, long_label: parent_label} END) AS parents
  }
  CALL {
    WITH org
    OPTIONAL MATCH (child:OrganizationUnit)-[:PART_OF|MEMBER_OF]->(org)
    OPTIONAL MATCH (child)-[:HAS_LONG_LABEL]->(cll:Literal {type: 'organization_long_label'})
    WITH child, collect(cll.value)[0] AS child_label
    RETURN collect(DISTINCT CASE WHEN child IS NOT NULL
      THEN {uid: child.uid, long_label: child_label} END) AS children
  }
  WITH org, long_label, parents, children,
    CASE
      WHEN any(v IN [(org)-[:HAS_SHORT_LABEL]->(s) | s.value] WHERE toLower(v) = toLower($name)) THEN 1
      WHEN any(v IN [(org)-[:HAS_SHORT_LABEL]->(s) | s.value] WHERE toLower(' ' + v + ' ') CONTAINS toLower(' ' + $name + ' ')) THEN 2
      WHEN any(v IN [(org)-[:HAS_SHORT_LABEL]->(s) | s.value] WHERE toLower(v) CONTAINS toLower($name)) THEN 3
      ELSE 4
    END AS label_priority,
    CASE
      WHEN org:ResearchUnit OR org:Team THEN 1
      WHEN org:Unit THEN 2
      WHEN org:Institution THEN 3
      ELSE 4
    END AS type_priority
  RETURN
    org.uid AS uid,
    long_label,
    org.generic_type AS type,
    CASE WHEN $include_parent = 1 THEN parents[0] ELSE null END AS parent,
    CASE WHEN $include_children = 1 THEN children ELSE [] END AS children
  ORDER BY label_priority ASC, type_priority ASC
  LIMIT $limit

---

kind: tool
name: get-organization-unit-members
type: neo4j-cypher
source: crisalid-neo4j
description: |
  Return all persons who are direct members of a given OrganizationUnit,
  identified by its UID. Uses the MEMBER_OF relationship from Person nodes
  to the unit — only direct members are returned, not members of child units.
  Returns an empty list if the unit has no direct members.
parameters:
  - name: organization_unit_uid
    type: string
    description: Unique identifier of the OrganizationUnit (OrganizationUnit.uid)
statement: |
  MATCH (person:Person)-[:MEMBER_OF]->(org:OrganizationUnit {uid: $organization_unit_uid})
  RETURN
    org.uid AS organization_unit_uid,
    collect(DISTINCT {person_uid: person.uid, person_name: person.display_name}) AS members,
    count(DISTINCT person) AS member_count

---

kind: tool
name: publications-by-theme
type: neo4j-cypher
source: crisalid-neo4j
description: |
  Return publications whose titles (and optionally abstracts) best match a given
  theme, using semantic similarity search. Results are deduplicated by document
  and ordered from closest to farthest match.
parameters:
  - name: semantic_theme
    type: string
    description: The theme to search for, as a natural language string (e.g. "machine learning applied to climate modelling")
  - name: semantic_theme_vector
    type: array
    description: Embedding vector for theme (1024 floats, bge-m3 model)
    items:
      name: component
      type: float
      description: Vector component
    default: []
  - name: limit
    type: integer
    description: Maximum number of documents to return (max 100)
    default: 10
  - name: use_abstract
    type: boolean
    description: If true, search abstracts in addition to titles and include them in results
    default: false
statement: |
  CALL db.index.vector.queryNodes('embeddable_embedding', toInteger($limit) * 100, $semantic_theme_vector)
  YIELD node AS literal, score
  WHERE literal.embedding_status = 'success'
    AND literal.type IN (CASE WHEN $use_abstract
      THEN ['document_title', 'document_abstract']
      ELSE ['document_title'] END)
  MATCH (doc:Document)-[:HAS_TITLE|HAS_ABSTRACT]->(literal)
  WITH doc, max(score) AS best_score
  ORDER BY best_score DESC
  LIMIT $limit
  CALL {
    WITH doc
    MATCH (doc)-[:HAS_TITLE]->(t:Literal {type: 'document_title'})
    RETURN collect(t.value) AS titles
  }
  CALL {
    WITH doc
    OPTIONAL MATCH (doc)-[:HAS_ABSTRACT]->(a)
    RETURN collect(a.value) AS all_abstracts
  }
  CALL {
    WITH doc
    OPTIONAL MATCH (doc)-[:HAS_CONTRIBUTION]->(contrib:Contribution)<-[:HAS_CONTRIBUTION]-(contributor:Person)
    RETURN collect(DISTINCT CASE WHEN contributor IS NOT NULL THEN {
      uid: contributor.uid,
      name: contributor.display_name,
      external: contributor.external,
      roles: contrib.roles
    } END) AS contributors
  }
  RETURN doc.uid AS uid,
         best_score AS score,
         titles,
         CASE WHEN $use_abstract THEN all_abstracts ELSE null END AS abstracts,
         contributors
  ORDER BY score DESC

---

# SorboBot tools — MCP-compatible Cypher tools for the Sorbonne research graph

kind: tool
name: sorbobot-search-domains
type: neo4j-cypher
source: crisalid-neo4j
description: |
  Search for research Domain nodes whose name matches a keyword.
  Only counts Document→Domain links whose HAS_DOMAIN similarity meets the threshold,
  so domains with few qualifying publications rank lower.
  Returns name, full_path, depth, and nb_docs (qualifying document count).
  Call this FIRST when looking for experts in a research field, then pass the
  returned full_path values to sorbobot-get-domain-authors.
parameters:
  - name: keyword
    type: string
    description: Research domain keyword in English (e.g. "natural language processing")
  - name: similarity_threshold
    type: float
    description: |
      Minimum r.similarity on HAS_DOMAIN edges used for counting qualifying documents (0–1).
      Applied only to the document count — NOT to author retrieval.
      Default 0.63.
    default: 0.63
  - name: min_depth
    type: integer
    description: Minimum domain hierarchy depth (2 = sub-field, 1 = top-level). Default 2.
    default: 2
  - name: limit
    type: integer
    description: Maximum number of domains to return. Default 20.
    default: 20
statement: |
  MATCH (domain:Domain)
  WHERE toLower(domain.name) CONTAINS toLower($keyword)
    AND domain.depth >= $min_depth
    AND domain.depth <= 5
  OPTIONAL MATCH (doc:Document)-[r:HAS_DOMAIN]->(domain)
  WHERE r.similarity >= $similarity_threshold
  WITH domain, count(doc) AS nb_docs
  ORDER BY
    CASE WHEN nb_docs > 0 THEN 0 ELSE 1 END,
    domain.depth ASC,
    nb_docs DESC
  LIMIT $limit
  RETURN
    domain.name      AS name,
    domain.full_path AS full_path,
    domain.depth     AS depth,
    nb_docs

---

kind: tool
name: sorbobot-get-domain-authors
type: neo4j-cypher
source: crisalid-neo4j
description: |
  Find internal Sorbonne researchers (Person.external = false) whose publications
  are associated with the given domain full_paths.
  IMPORTANT: No HAS_DOMAIN similarity filter is applied here — the similarity
  threshold is only used at the domain-finding stage (sorbobot-search-domains).
  Applying it at this stage would incorrectly exclude many publications.
  Returns authors ranked by number of qualifying publications, with a sample of
  article titles and the domain paths they belong to.
  Use after sorbobot-search-domains (and optionally sorbobot-judge-domains).
  For adaptive scope adjustment, use sorbobot-get-parent-domains when too few
  authors are returned, or query child domains when too many.
parameters:
  - name: domain_paths
    type: string
    description: Comma-separated list of Domain.full_path values
  - name: limit
    type: integer
    description: Maximum number of authors to return. Default 20.
    default: 20
statement: |
  WITH split($domain_paths, ',') AS paths
  MATCH (domain:Domain)
  WHERE domain.full_path IN [p IN paths | trim(p)]
  MATCH (doc:Document)-[:HAS_DOMAIN]->(domain)
  MATCH (doc)-[:HAS_CONTRIBUTION]->(c:Contribution)<-[:HAS_CONTRIBUTION]-(p:Person)
  WHERE p.external = false AND p.display_name IS NOT NULL
  OPTIONAL MATCH (doc)-[:HAS_TITLE]->(t:Literal)
  WITH p, domain, doc, collect(t.value)[0] AS doc_title
  WITH p,
       count(DISTINCT doc)                AS nb_publications,
       collect(DISTINCT domain.name)[..3] AS sample_domains,
       collect(DISTINCT {
         uid:   doc.uid,
         title: coalesce(doc_title, doc.uid),
         path:  domain.full_path
       })[..10]                           AS sample_articles
  ORDER BY nb_publications DESC
  LIMIT $limit
  RETURN
    p.uid            AS uid,
    p.display_name   AS display_name,
    nb_publications,
    sample_domains,
    sample_articles

---

kind: tool
name: sorbobot-get-parent-domains
type: neo4j-cypher
source: crisalid-neo4j
description: |
  Return the parent domains (one level up in the OpenAlex hierarchy) for the
  given domain full_paths. Use for ADAPTIVE SEARCH: when sorbobot-get-domain-authors
  returns too few researchers (< 10), call this tool to get broader parent domains,
  then retry sorbobot-get-domain-authors with the parent full_paths.
parameters:
  - name: domain_paths
    type: string
    description: Comma-separated list of Domain.full_path values
statement: |
  WITH split($domain_paths, ',') AS paths
  MATCH (child:Domain)
  WHERE child.full_path IN [p IN paths | trim(p)]
  MATCH (child)-[:HAS_PARENT]->(parent:Domain)
  RETURN DISTINCT
    parent.name      AS name,
    parent.full_path AS full_path,
    parent.depth     AS depth
  ORDER BY parent.depth DESC

---

kind: tool
name: sorbobot-get-person-expertise
type: neo4j-cypher
source: crisalid-neo4j
description: |
  Return the top research domains for a named internal Sorbonne researcher.
  Domains are ranked by number of associated publications.
  Handles partial names (substring match on display_name).
  For misspelled names, try the closest substring of the name you know.
  Use when the user asks what a specific person researches or works on.
parameters:
  - name: name
    type: string
    description: Full or partial display name of the researcher
  - name: limit
    type: integer
    description: Number of top domains to return. Default 10.
    default: 10
statement: |
  MATCH (p:Person)
  WHERE toLower(p.display_name) CONTAINS toLower($name)
    AND p.external = false
  WITH p ORDER BY p.display_name ASC LIMIT 5
  MATCH (p)-[:HAS_CONTRIBUTION]->(c:Contribution)<-[:HAS_CONTRIBUTION]-(doc:Document)
  MATCH (doc)-[:HAS_DOMAIN]->(domain:Domain)
  WHERE domain.depth >= 2
  WITH p, domain, count(DISTINCT doc) AS nb_publications
  ORDER BY nb_publications DESC
  LIMIT $limit
  RETURN
    p.uid            AS uid,
    p.display_name   AS display_name,
    domain.name      AS domain_name,
    domain.full_path AS domain_path,
    nb_publications

