kind: tool
name: search-person-by-name
type: neo4j-cypher
source: crisalid-neo4j
description: |
  Search for a person in the CRISalid knowledge graph by display name.
  Handles any word order, single last name, accent variants, misspellings,
  and hyphenated compound names (e.g. "Martinet-Dupré" still matches "Martinet").
  Returns candidates ranked by relevance score, each with uid, identifiers, and
  laboratory membership.
parameters:
  - name: name
    type: string
    description: Name to search for — first name, last name, or both in any order; misspellings and accent variants are tolerated
  - name: max_results
    type: integer
    description: Maximum number of candidates to return
statement: |
  WITH $name AS raw_input
  WITH replace(raw_input, '-', ' ') AS input
  WITH input, split(trim(input), ' ') AS tokens
  WITH input, tokens,
       tokens[0] AS t0,
       CASE WHEN size(tokens) > 1 THEN tokens[1] ELSE tokens[0] END AS t1
  // Build a 4-tier Lucene query (example input: "Alice Martinet-Dupré"):
  //   tier 1 — exact phrase, any order:        display_name:"Alice Martinet Dupré"^10
  //   tier 2 — fuzzy AND of ALL tokens:        display_name:(Alice~2 AND Martinet~2 AND Dupré~2)^5
  //   tier 3 — fuzzy AND of first two tokens:  display_name:(Alice~2 AND Martinet~2)^3
  //   tier 4 — second token fuzzy alone:       display_name:Martinet~2
  WITH
    'display_name:"' + input + '"^10 OR display_name:(' +
    reduce(acc = '', t IN tokens | CASE WHEN acc = '' THEN t + '~2' ELSE acc + ' AND ' + t + '~2' END) +
    ')^5 OR display_name:(' + t0 + '~2 AND ' + t1 + '~2)^3 OR display_name:' + t1 + '~2' AS lucene_query
  CALL db.index.fulltext.queryNodes('person_fulltext_name', lucene_query)
  YIELD node AS person, score
  WITH person, score ORDER BY score DESC LIMIT $max_results
  OPTIONAL MATCH (person)-[:HAS_IDENTIFIER]->(id:AgentIdentifier)
  WITH person, score,
       collect(DISTINCT CASE WHEN id IS NOT NULL THEN {type: id.type, value: id.value} END) AS identifiers
  OPTIONAL MATCH (person)-[:MEMBER_OF]->(ru:OrganizationUnit)
  OPTIONAL MATCH (ru)-[:HAS_LONG_LABEL]->(ll:Literal {type: 'organization_long_label'})
  OPTIONAL MATCH (ru)-[:HAS_SHORT_LABEL]->(sl:Literal {type: 'organization_short_label'})
  WITH person, score, identifiers, ru,
       collect(DISTINCT CASE WHEN ll IS NOT NULL THEN ll.value END) AS long_labels,
       collect(DISTINCT CASE WHEN sl IS NOT NULL THEN sl.value END) AS short_labels
  RETURN
    person.uid AS uid,
    person.display_name AS display_name,
    person.external AS external,
    score,
    identifiers,
    collect(DISTINCT CASE WHEN ru IS NOT NULL THEN {uid: ru.uid, long_labels: long_labels, short_labels: short_labels} END) AS laboratories
  ORDER BY score DESC

---

kind: tool
name: list-person-collaborators
type: neo4j-cypher
source: crisalid-neo4j
description: |
  List the collaborators of a person — defined as people who co-authored at least
  one Document with them. Results are ordered by number of shared publications
  (descending) and capped at 15.
  Each entry includes the collaborator's uid, display name, names (first/last),
  whether they are internal or external, and the list of shared document titles.
  Affiliations (from co-author contribution statements) are included only when
  explicitly requested.
parameters:
  - name: person_uid
    type: string
    description: Unique identifier of the person (Person.uid)
  - name: start_date
    type: string
    description: "Filter collaborations from this date onward (ISO 8601, e.g. '2020-01-01'). Leave empty for no lower bound."
    default: ""
  - name: end_date
    type: string
    description: "Filter collaborations up to this date (ISO 8601). Defaults to today when start_date is provided but end_date is omitted. Leave empty for no upper bound."
    default: ""
  - name: include_affiliations
    type: integer
    description: Set to 1 to include each collaborator's institutional affiliations, 0 to omit
    default: 0
statement: |
  MATCH (person:Person {uid: $person_uid})-[:HAS_CONTRIBUTION]->(:Contribution)<-[:HAS_CONTRIBUTION]-(doc:Document)
  WHERE ($start_date = '' OR doc.publication_date >= $start_date)
    AND (CASE
      WHEN $end_date = '' AND $start_date <> '' THEN doc.publication_date <= toString(date())
      WHEN $end_date <> '' THEN doc.publication_date <= $end_date
      ELSE true
    END)
  MATCH (doc)-[:HAS_CONTRIBUTION]->(collab_contrib:Contribution)<-[:HAS_CONTRIBUTION]-(collaborator:Person)
  WHERE collaborator <> person
  OPTIONAL MATCH (doc)-[:HAS_TITLE]->(t:Literal)
  WITH collaborator, collab_contrib, doc, collect(t.value)[0] AS doc_title
  OPTIONAL MATCH (collab_contrib)-[:HAS_AFFILIATION_STATEMENT]->(org:AuthorityOrganization)
  WITH collaborator,
       collect(DISTINCT {uid: doc.uid, title: doc_title}) AS shared_docs,
       collect(DISTINCT CASE WHEN org IS NOT NULL
         THEN {uid: org.uid, display_names: org.display_names} END) AS affiliations
  ORDER BY size(shared_docs) DESC
  LIMIT 15
  OPTIONAL MATCH (collaborator)-[:HAS_NAME]->(pn:PersonName)
  OPTIONAL MATCH (pn)-[:HAS_FIRST_NAME]->(fn:Literal)
  OPTIONAL MATCH (pn)-[:HAS_LAST_NAME]->(ln:Literal)
  WITH collaborator, shared_docs, affiliations,
       collect(DISTINCT CASE WHEN fn IS NOT NULL OR ln IS NOT NULL
         THEN {first_name: fn.value, last_name: ln.value} END) AS names
  RETURN
    collaborator.uid AS uid,
    collaborator.display_name AS display_name,
    collaborator.external AS external,
    names,
    shared_docs,
    CASE WHEN $include_affiliations = 1 THEN affiliations ELSE [] END AS affiliations
  ORDER BY size(shared_docs) DESC

---

kind: tool
name: get-institution-locations
type: neo4j-cypher
source: crisalid-neo4j
description: |
  Return location data (coordinates and physical address) for one or more affiliation
  institutions identified by their UIDs. UIDs refer to AuthorityOrganization nodes —
  either Root or State subtypes — as returned by tools such as list-person-collaborators.
  One entry is returned per input UID, including empty location fields when the institution
  is not found or has no location data.
parameters:
  - name: institution_uids
    type: string
    description: UID or comma-separated list of UIDs of the affiliation institutions (AuthorityOrganization.uid)
statement: |
  WITH split($institution_uids, ',') AS uid_list
  UNWIND uid_list AS raw_uid
  WITH trim(raw_uid) AS institution_uid
  OPTIONAL MATCH (org:AuthorityOrganization {uid: institution_uid})
  OPTIONAL MATCH (org)-[:HAS_POS]->(place:Place)
  WITH institution_uid, org,
       collect(DISTINCT CASE WHEN place IS NOT NULL
         THEN {latitude: place.latitude, longitude: place.longitude} END) AS coordinates
  OPTIONAL MATCH (org)-[:HAS_ADDRESS]->(addr:StructuredPhysicalAddress)
  OPTIONAL MATCH (addr)-[:HAS_STREET]->(street:Literal {type: 'institution_street_name'})
  OPTIONAL MATCH (addr)-[:HAS_CITY]->(city:Literal {type: 'institution_city_name'})
  OPTIONAL MATCH (addr)-[:HAS_ZIP_CODE]->(zip:Literal {type: 'institution_zip_code'})
  OPTIONAL MATCH (addr)-[:HAS_STATE]->(state_lit:Literal {type: 'institution_state_name'})
  OPTIONAL MATCH (addr)-[:HAS_COUNTRY]->(country:Literal {type: 'institution_country_name'})
  OPTIONAL MATCH (addr)-[:HAS_CONTINENT]->(continent:Literal {type: 'institution_continent_name'})
  WITH institution_uid, org, coordinates, addr,
       collect(DISTINCT CASE WHEN street IS NOT NULL
         THEN {value: street.value, language: coalesce(street.language, 'und')} END) AS streets,
       collect(DISTINCT CASE WHEN city IS NOT NULL
         THEN {value: city.value, language: coalesce(city.language, 'und')} END) AS cities,
       collect(DISTINCT CASE WHEN zip IS NOT NULL
         THEN {value: zip.value, language: coalesce(zip.language, 'und')} END) AS zip_codes,
       collect(DISTINCT CASE WHEN state_lit IS NOT NULL
         THEN {value: state_lit.value, language: coalesce(state_lit.language, 'und')} END) AS states,
       collect(DISTINCT CASE WHEN country IS NOT NULL
         THEN {value: country.value, language: coalesce(country.language, 'und')} END) AS countries,
       collect(DISTINCT CASE WHEN continent IS NOT NULL
         THEN {value: continent.value, language: coalesce(continent.language, 'und')} END) AS continents
  RETURN
      institution_uid AS uid,
      org.display_names AS display_names,
      coordinates,
      collect(DISTINCT CASE WHEN addr IS NOT NULL THEN {
          uid: addr.uid,
          street: streets,
          city: cities,
          zip_code: zip_codes,
          state_or_province: states,
          country: countries,
          continent: continents
      } END) AS addresses

---

kind: tool
name: get-person-memberships
type: neo4j-cypher
source: crisalid-neo4j
description: |
  Return the OrganizationUnit(s) that a person is directly a member of,
  as recorded in the institution's directory (MEMBER_OF relationships).
  Each entry includes the unit UID and its human-readable labels (long name
  and short name/acronym), which may be available in multiple languages.
  Returns an empty list if the person has no direct memberships.
parameters:
  - name: person_uid
    type: string
    description: Unique identifier of the person (Person.uid)
statement: |
  MATCH (person:Person {uid: $person_uid})-[:MEMBER_OF]->(org:OrganizationUnit)
  OPTIONAL MATCH (org)-[:HAS_LONG_LABEL]->(ll:Literal {type: 'organization_long_label'})
  OPTIONAL MATCH (org)-[:HAS_SHORT_LABEL]->(sl:Literal {type: 'organization_short_label'})
  WITH org,
       collect(DISTINCT CASE WHEN ll IS NOT NULL THEN {value: ll.value, language: ll.language} END) AS long_labels,
       collect(DISTINCT CASE WHEN sl IS NOT NULL THEN {value: sl.value, language: sl.language} END) AS short_labels
  RETURN
    org.uid AS institution_uid,
    long_labels,
    short_labels

---

kind: tool
name: search-researchers-by-concept
type: neo4j-cypher
source: crisalid-neo4j
description: |
  Search for internal researchers who have authored publications related to a
  given concept or keyword. The concept string is matched as a case-insensitive
  substring against all concept labels (preferred and alternative, any language)
  and against free-text keyword labels.
  Returns one entry per researcher, sorted by number of matching publications
  (highest first). Only researchers with external: false are included.
parameters:
  - name: concept
    type: string
    description: Free-text concept to search for — matched as a case-insensitive substring against concept/keyword labels
  - name: limit
    type: integer
    description: Maximum number of researchers to return
    default: 15
statement: |
  MATCH (person:Person {external: false})-[:HAS_CONTRIBUTION]->(:Contribution)<-[:HAS_CONTRIBUTION]-(doc:Document)
  MATCH (doc)-[:HAS_SUBJECT]->(concept:Concept)
  WHERE (
    any(v IN [(concept)-[:HAS_PREF_LABEL]->(l) | l.value] WHERE toLower(v) CONTAINS toLower($concept))
    OR any(v IN [(concept)-[:HAS_ALT_LABEL]->(l) | l.value] WHERE toLower(v) CONTAINS toLower($concept))
    OR (concept.prefLabel IS NOT NULL AND toLower(concept.prefLabel) CONTAINS toLower($concept))
  )
  WITH DISTINCT person, doc
  OPTIONAL MATCH (doc)-[:HAS_TITLE]->(t:Literal)
  WITH person, doc, collect(t.value)[0] AS title
  WITH person,
       collect(DISTINCT title) AS publication_titles,
       count(DISTINCT doc) AS publication_count
  RETURN
    person.uid AS researcher_uid,
    person.display_name AS researcher_name,
    publication_titles,
    publication_count
  ORDER BY publication_count DESC
  LIMIT $limit

---

kind: tool
name: search-organization-unit-by-name
type: neo4j-cypher
source: crisalid-neo4j
description: |
  Search for OrganizationUnit nodes by a partial name string, matched
  case-insensitively against both long labels and short labels.
  Returns uid, long label, and generic type for each match.
  Optionally includes the direct parent unit and/or direct child units.
parameters:
  - name: name
    type: string
    description: Partial name to search for — case-insensitive substring match against long and short labels
  - name: include_parent
    type: integer
    description: Set to 1 to include the direct parent OrganizationUnit for each match
    default: 0
  - name: include_children
    type: integer
    description: Set to 1 to include direct child OrganizationUnits for each match
    default: 0
  - name: limit
    type: integer
    description: Maximum number of results to return — short label matches and research units rank first
    default: 1
statement: |
  MATCH (org:OrganizationUnit)
  WHERE (
    any(v IN [(org)-[:HAS_LONG_LABEL]->(l) | l.value] WHERE toLower(v) CONTAINS toLower($name))
    OR any(v IN [(org)-[:HAS_SHORT_LABEL]->(s) | s.value] WHERE toLower(v) CONTAINS toLower($name))
  )
  CALL {
    WITH org
    OPTIONAL MATCH (org)-[:HAS_LONG_LABEL]->(ll:Literal {type: 'organization_long_label'})
    RETURN collect(ll.value)[0] AS long_label
  }
  CALL {
    WITH org
    OPTIONAL MATCH (org)-[:PART_OF|MEMBER_OF]->(parent:OrganizationUnit)
    OPTIONAL MATCH (parent)-[:HAS_LONG_LABEL]->(pll:Literal {type: 'organization_long_label'})
    WITH parent, collect(pll.value)[0] AS parent_label
    RETURN collect(DISTINCT CASE WHEN parent IS NOT NULL
      THEN {uid: parent.uid, long_label: parent_label} END) AS parents
  }
  CALL {
    WITH org
    OPTIONAL MATCH (child:OrganizationUnit)-[:PART_OF|MEMBER_OF]->(org)
    OPTIONAL MATCH (child)-[:HAS_LONG_LABEL]->(cll:Literal {type: 'organization_long_label'})
    WITH child, collect(cll.value)[0] AS child_label
    RETURN collect(DISTINCT CASE WHEN child IS NOT NULL
      THEN {uid: child.uid, long_label: child_label} END) AS children
  }
  WITH org, long_label, parents, children,
    CASE
      WHEN any(v IN [(org)-[:HAS_SHORT_LABEL]->(s) | s.value] WHERE toLower(v) = toLower($name)) THEN 1
      WHEN any(v IN [(org)-[:HAS_SHORT_LABEL]->(s) | s.value] WHERE toLower(v) CONTAINS toLower($name)) THEN 2
      ELSE 3
    END AS label_priority,
    CASE
      WHEN org:ResearchUnit OR org:Team THEN 1
      WHEN org:Unit THEN 2
      WHEN org:Institution THEN 3
      ELSE 4
    END AS type_priority
  RETURN
    org.uid AS uid,
    long_label,
    org.generic_type AS type,
    CASE WHEN $include_parent = 1 THEN parents[0] ELSE null END AS parent,
    CASE WHEN $include_children = 1 THEN children ELSE [] END AS children
  ORDER BY label_priority ASC, type_priority ASC
  LIMIT $limit

---

# Restricted toolset: curated domain tools only, no raw Cypher access.
# Load with: client.load_toolset("crisalid-restricted")
kind: toolset
name: crisalid-restricted
tools:
  - get-crisalid-schema
  - list-person-publications
  - get-publication
  - list-person-concepts
  - search-person-by-name
  - list-person-collaborators
  - get-institution-locations
  - get-person-memberships
  - search-researchers-by-concept
  - search-organization-unit-by-name

---

# Unrestricted toolset: adds raw read-only Cypher access.
# Load with: client.load_toolset("crisalid-unrestricted")
kind: toolset
name: crisalid-unrestricted
tools:
  - get-crisalid-schema
  - list-person-publications
  - get-publication
  - list-person-concepts
  - search-person-by-name
  - list-person-collaborators
  - get-institution-locations
  - get-person-memberships
  - search-researchers-by-concept
  - search-organization-unit-by-name
  - execute-cypher-readonly
