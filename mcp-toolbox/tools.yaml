kind: source
name: crisalid-neo4j
type: neo4j
uri: ${NEO4J_URI}
user: ${NEO4J_USER}
password: ${NEO4J_PASSWORD}
database: neo4j

---

kind: tool
name: get-crisalid-schema
type: neo4j-schema
source: crisalid-neo4j
description: |
  Return the full schema of the CRISalid knowledge graph: node labels,
  relationship types, and property keys. Use this to understand what
  queries are possible before calling other tools.
cacheExpireMinutes: 120

---

kind: tool
name: execute-cypher-readonly
type: neo4j-execute-cypher
source: crisalid-neo4j
description: |
  Execute an arbitrary read-only Cypher query against the CRISalid knowledge graph.
  Only read queries are allowed (no CREATE, MERGE, DELETE, SET).
  Intended for advanced clients with direct graph access needs.
readOnly: true

---

kind: tool
name: list-person-publications
type: neo4j-cypher
source: crisalid-neo4j
description: |
  List all publications for a person identified by their uid.
  Returns for each document: uid, one title, and publication date.
  Use get-publication with a document uid to retrieve full details.
parameters:
  - name: person_uid
    type: string
    description: Unique identifier of the person (Person.uid)
statement: |
  MATCH (person:Person {uid: $person_uid})-[:HAS_CONTRIBUTION]->(:Contribution)<-[:HAS_CONTRIBUTION]-(doc:Document)
  OPTIONAL MATCH (doc)-[:HAS_TITLE]->(t:Literal)
  WITH doc, collect(t.value)[0] AS title
  RETURN doc.uid AS uid,
         title,
         doc.publication_date AS publication_date
  ORDER BY doc.publication_date DESC

---

kind: tool
name: get-publication
type: neo4j-cypher
source: crisalid-neo4j
description: |
  Return full details for a document identified by its uid.
  Returns titles, journal channel (volume/issue/pages + identifiers),
  source records (harvester metadata only — no SourceJournal or SourceContribution),
  and co-authors with their institutional affiliation statements.
parameters:
  - name: uid
    type: string
    description: Unique identifier of the document (Document.uid)
statement: |
  MATCH (doc:Document {uid: $uid})
  CALL {
    WITH doc
    OPTIONAL MATCH (doc)-[:HAS_TITLE]->(t:Literal)
    RETURN collect(DISTINCT t.value) AS titles
  }
  CALL {
    WITH doc
    OPTIONAL MATCH (doc)-[pub:PUBLISHED_IN]->(journal:Journal)
    OPTIONAL MATCH (journal)-[:HAS_IDENTIFIER]->(jid:JournalIdentifier)
    WITH pub, journal, collect(DISTINCT jid) AS journal_identifiers
    RETURN collect(DISTINCT CASE WHEN journal IS NOT NULL THEN {
      volume: pub.volume, issue: pub.issue, pages: pub.pages,
      uid: journal.uid, issn_l: journal.issn_l,
      publisher: journal.publisher, titles: journal.titles,
      labels: labels(journal),
      identifiers: journal_identifiers
    } END) AS publication_channels
  }
  CALL {
    WITH doc
    OPTIONAL MATCH (doc)-[:HAS_ABSTRACT]->(a:TextLiteral)
    RETURN collect(DISTINCT CASE WHEN a IS NOT NULL
      THEN {value: a.value, language: a.language} END) AS abstracts
  }
  CALL {
    WITH doc
    OPTIONAL MATCH (doc)-[:RECORDED_BY]->(sr:SourceRecord)
    RETURN collect(DISTINCT CASE WHEN sr IS NOT NULL THEN {
      uid: sr.uid, harvester: sr.harvester, url: sr.url,
      issued: sr.issued, document_types: sr.document_types,
      source_identifier: sr.source_identifier
    } END) AS source_records
  }
  CALL {
    WITH doc
    OPTIONAL MATCH (doc)-[:HAS_CONTRIBUTION]->(contrib:Contribution)<-[:HAS_CONTRIBUTION]-(contributor:Person)
    OPTIONAL MATCH (contributor)-[:HAS_NAME]->(pn:PersonName)
    OPTIONAL MATCH (pn)-[:HAS_FIRST_NAME]->(fn:Literal)
    OPTIONAL MATCH (pn)-[:HAS_LAST_NAME]->(ln:Literal)
    OPTIONAL MATCH (contrib)-[:HAS_AFFILIATION_STATEMENT]->(affil:AuthorityOrganization)
    WITH contrib, contributor,
         collect(DISTINCT {first_name: fn.value, last_name: ln.value}) AS names,
         collect(DISTINCT CASE WHEN affil IS NOT NULL
           THEN {uid: affil.uid, display_names: affil.display_names} END) AS affiliations
    RETURN collect(DISTINCT CASE WHEN contributor IS NOT NULL THEN {
      roles: contrib.roles,
      affiliations: affiliations,
      person: {uid: contributor.uid, external: contributor.external, names: names}
    } END) AS contributions
  }
  RETURN doc.uid AS uid,
         doc.document_type AS document_type,
         doc.publication_date AS publication_date,
         doc.publication_date_start AS publication_date_start,
         doc.publication_date_end AS publication_date_end,
         doc.oa_status AS oa_status,
         doc.upw_oa_status AS upw_oa_status,
         titles, abstracts, publication_channels, source_records, contributions

---

kind: tool
name: list-person-concepts
type: neo4j-cypher
source: crisalid-neo4j
description: |
  List the research concepts (SKOS subjects) associated with a person's publications,
  ranked by prominence (most frequently tagged first).
  Each concept includes its uid, URI (if a controlled-vocabulary concept), preferred
  labels, and the uids of the tagged documents.
  Preferred labels are returned in the requested languages; if none match, English is
  used as a fallback, and if English is also absent all available labels are returned
  (up to 3). Alternative labels are returned only when explicitly requested.

  IMPORTANT — noise in results: the underlying bibliographic data is harvested from
  multiple sources and is not curated. As a result, some returned concepts may be
  generic document-type labels (e.g. "Thèses et écrits académiques", "Actes de
  congrès") or overly broad domain labels (e.g. "Sociologie", "Sciences humaines")
  rather than genuine research topics. Clients should treat these with low confidence
  and may choose to ignore them or deprioritise them when presenting results to users.
parameters:
  - name: person_uid
    type: string
    description: Unique identifier of the person (Person.uid)
  - name: languages
    type: string
    description: Comma-separated preferred language codes, ISO 639-1 (e.g. "en" or "en,fr")
    default: "en"
  - name: include_alt_labels
    type: integer
    description: Set to 1 to include alternative labels (skos:altLabel) for each concept, 0 to omit
    default: 0
  - name: limit
    type: integer
    description: Maximum number of concepts to return, ranked by prominence
    default: 15
statement: |
  MATCH (person:Person {uid: $person_uid})-[:HAS_CONTRIBUTION]->(:Contribution)<-[:HAS_CONTRIBUTION]-(doc:Document)
  MATCH (doc)-[:HAS_SUBJECT]->(concept:Concept)
  WITH concept, collect(DISTINCT doc.uid) AS document_uids, count(DISTINCT doc) AS doc_count
  ORDER BY doc_count DESC
  LIMIT $limit
  OPTIONAL MATCH (concept)-[:HAS_PREF_LABEL]->(pl:Literal {type: 'concept_pref_label'})
  WITH concept, document_uids,
       collect(DISTINCT {value: pl.value, language: CASE WHEN pl.language = 'ul' THEN null ELSE pl.language END}) AS all_pref_labels
  WITH concept, document_uids, all_pref_labels,
       [l IN all_pref_labels WHERE l.language IN split($languages, ',')] AS requested_pref_labels,
       [l IN all_pref_labels WHERE l.language = 'en'] AS en_pref_labels,
       [l IN all_pref_labels WHERE l.language IS NULL] AS undetermined_pref_labels
  WITH concept, document_uids, undetermined_pref_labels,
       CASE
         WHEN size(requested_pref_labels) > 0 THEN requested_pref_labels
         WHEN size(en_pref_labels) > 0 THEN en_pref_labels
         ELSE [l IN all_pref_labels WHERE l.language IS NOT NULL][..3]
       END AS lang_pref_labels
  WITH concept, document_uids,
       lang_pref_labels + [l IN undetermined_pref_labels WHERE NOT l IN lang_pref_labels] AS pref_labels
  OPTIONAL MATCH (concept)-[:HAS_ALT_LABEL]->(al:Literal {type: 'concept_alt_label'})
  WITH concept, document_uids, pref_labels,
       collect(DISTINCT CASE
         WHEN al IS NOT NULL AND $include_alt_labels = 1
         THEN {value: al.value, language: CASE WHEN al.language = 'ul' THEN null ELSE al.language END}
       END) AS alt_labels
  RETURN
    concept.uid AS uid,
    concept.uri AS uri,
    pref_labels,
    alt_labels,
    document_uids

