name: crisalid-ai-skills CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  test:

    runs-on: ubuntu-latest

    services:
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: none
          NEO4JLABS_PLUGINS: '["apoc"]'
          NEO4J_apoc_export_file_enabled: 'true'
          NEO4J_apoc_import_file_enabled: 'true'
          NEO4J_apoc_import_file_use__neo4j__config: 'true'
        ports:
          - 7688:7687
        options: --health-cmd "neo4j-admin server status" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev

      - name: Start MCP Toolbox server
        working-directory: mcp-toolbox
        env:
          NEO4J_URI: bolt://localhost:7688
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: test
        run: |
          npx --yes @toolbox-sdk/server --config tools.yaml &
          timeout 30 bash -c 'until nc -z localhost 5000; do sleep 1; done'

      - name: Run tests
        run: uv run pytest tests/ -v

  lint:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint with ruff
        run: uv run ruff check .
